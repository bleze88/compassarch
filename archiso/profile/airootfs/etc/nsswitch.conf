# Begin /etc/nsswitch.conf
#
# Ajout de "sss" pour passwd/group/shadow/sudoers afin que les comptes
# Active Directory (via sssd, après `realm join`) soient résolus au même
# titre que les comptes locaux. Cf. ArchWiki "LDAP authentication#NSS configuration".

passwd: files systemd sss
group: files systemd sss
shadow: files sss
sudoers: files sss

publickey: files

hosts: files mymachines resolve [!UNAVAIL=return] dns myhostname
networks: files

protocols: files
services: files
ethers: files
rpc: files

netgroup: files

# End /etc/nsswitch.conf
