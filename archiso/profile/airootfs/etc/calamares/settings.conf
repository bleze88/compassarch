# Configuration principale de Calamares pour Compass Arch.
#
# modules-search: "local" fait chercher les modules dans le chemin standard
# d'installation (/usr/lib/calamares/modules) - c'est là que
# archiso/calamares-modules/{adjoinview,adjoinjob} sont copiés au moment du
# build (voir build/01-build-calamares-modules.sh).
---
modules-search: [ local ]

instances:
  - id: fixmkinitcpio
    module: shellprocess
    config: shellprocess-fixmkinitcpio.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - adjoinview
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - shellprocess@fixmkinitcpio
      - initcpiocfg
      - initcpio
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - adjoinjob
      - grubcfg
      - bootloader
      - umount
  - show:
      - finished

branding: compass-arch

prompt-install: true

dont-chroot: false

oem-setup: false

disable-cancel: false

disable-cancel-during-exec: true

hide-back-and-next-during-exec: true

quit-at-end: false
