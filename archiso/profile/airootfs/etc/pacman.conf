#
# /etc/pacman.conf
#
# See the pacman.conf(5) manpage for option and repository directives
#
# Ce fichier est celui qui sera réellement installé sur le système live ET
# sur le système installé (copié par mkarchiso avant pacstrap, protégé par
# pacman comme fichier de config existant, puis transporté sur la cible par
# le module Calamares "unpackfs"). Contrairement à archiso/profile/pacman.conf
# (qui ne sert qu'au moment du build), le [custom] ci-dessous pointe vers un
# chemin *à l'intérieur* du système (/repo/local), présent dans l'image
# puisque copié par local-repo/ dans airootfs/repo/local.
#
# NOTE: le nom "local" est RÉSERVÉ par pacman (base de données interne des
# paquets installés) - d'où "custom" pour notre dépôt (voir
# archiso/profile/pacman.conf pour le détail de l'erreur que ça provoque).
#

[options]
Architecture = auto
HoldPkg     = pacman glibc
ParallelDownloads = 5

SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Dépôt local embarqué dans l'image (yay, realmd, adcli, calamares).
[custom]
SigLevel = Optional TrustAll
Server = file:///repo/local

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
