# GRUB comme chargeur de démarrage sur le système installé (BIOS et UEFI),
# avec détection des autres OS (os-prober, déjà dans packages.x86_64) pour
# le dual-boot. Note: c'est indépendant du fait que le média live démarre,
# lui, via systemd-boot/syslinux (profiledef.sh) - ce sont deux systèmes
# distincts (live vs cible installée).
---
efiBootLoader: "grub"

kernel: "/vmlinuz-linux"
img: "/initramfs-linux.img"
fallback: "/initramfs-linux-fallback.img"
timeout: "5"

bootloaderEntryName: "Compass Arch"

grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"

installEFIFallback: true
