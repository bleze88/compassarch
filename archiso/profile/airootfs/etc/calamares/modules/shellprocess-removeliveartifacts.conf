# Instance "removeliveartifacts" du module Calamares built-in "shellprocess".
# Voir usr/local/bin/remove-live-artifacts.sh pour le détail du pourquoi.
#
# dontChroot: false - tourne dans le chroot cible, après "users" (le compte
# réel existe déjà) et avant "displaymanager" (qui régénère la config SDDM
# sur une base débarrassée du fragment d'autologin live).
---
dontChroot: false
timeout: 10
verbose: true
script: "/usr/local/bin/remove-live-artifacts.sh"

i18n:
    name: "Cleaning up live session artifacts"
