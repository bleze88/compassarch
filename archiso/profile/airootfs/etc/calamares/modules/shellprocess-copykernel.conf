# Instance "copykernel" du module Calamares built-in "shellprocess".
# Voir usr/local/bin/copy-kernel-to-target.sh pour le détail du pourquoi.
#
# dontChroot: true - ce job tourne sur le système LIVE (pas dans le chroot
# cible), car /run/archiso/bootmnt (où se trouve le noyau à copier) n'est
# pas visible depuis l'intérieur du chroot cible. ${ROOT} est alors résolu
# par Calamares comme le point de montage de la cible vu depuis le live.
---
dontChroot: true
timeout: 30
verbose: true
script: "/usr/local/bin/copy-kernel-to-target.sh ${ROOT}"

i18n:
    name: "Copying kernel to target system"
