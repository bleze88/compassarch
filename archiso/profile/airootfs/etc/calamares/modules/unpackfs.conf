# Copie le squashfs du système live directement sur la cible (au lieu de
# réinstaller les paquets avec pacman) : yay/realmd/sssd/Plasma sont donc
# déjà présents sur le système installé sans accès réseau pendant l'install.
#
# Le chemin suit la convention archiso standard: /run/archiso/bootmnt est le
# point de montage du médium de boot, puis <install_dir>/<arch>/airootfs.sfs
# (voir archiso/profile/profiledef.sh: install_dir="arch", arch="x86_64").
---
unpack:
    -   source: "/run/archiso/bootmnt/arch/x86_64/airootfs.sfs"
        sourcefs: "squashfs"
        destination: ""
