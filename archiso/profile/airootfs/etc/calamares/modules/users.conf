# Configuration du module "users" (création du compte local + mot de passe root).
# Les comptes de domaine AD (après `realm join`, voir adjoinview/adjoinjob)
# viennent s'ajouter à ceux-ci via sssd, sans conflit.
---
defaultGroups:
    - wheel
    - storage
    - power
    - network
    - video
    - audio

autoLoginGroup: autologin

doAutoLogin: false

sudoersGroup: wheel

setRootPassword: true

doReusePassword: true

passwordRequirements:
    minLength: 1

allowWeakPasswords: true

allowWeakPasswordsDefault: true

userShell: /bin/bash

setHostname: EtcFile

writeHostsFile: true
