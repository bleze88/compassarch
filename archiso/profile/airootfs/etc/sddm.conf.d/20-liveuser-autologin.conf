# Autologin de liveuser - LIVE UNIQUEMENT (session live pour éviter un écran
# de connexion inutile sur le média de démonstration). Séparé de
# 10-wayland-default.conf pour pouvoir être supprimé spécifiquement sur le
# système installé par usr/local/bin/remove-live-artifacts.sh (voir
# docs/ARCHITECTURE.md "Comptes live et session dupliquée") - sinon
# unpackfs le copierait tel quel sur la cible, où le compte liveuser
# lui-même est censé être supprimé par le module Calamares "removeuser".
[Autologin]
User=liveuser
Session=plasma.desktop
