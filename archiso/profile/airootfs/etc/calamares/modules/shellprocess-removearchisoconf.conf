# Instance "removearchisoconf" du module Calamares built-in "shellprocess".
#
# Filet de sécurité : refait la suppression de
# /etc/mkinitcpio.conf.d/archiso.conf déjà tentée par
# shellprocess@fixmkinitcpio (voir usr/local/bin/fix-target-mkinitcpio.sh
# et docs/ARCHITECTURE.md), mais positionné ici juste avant "initcpio" (qui
# lance réellement mkinitcpio -p linux) plutôt qu'avant "initcpiocfg" -
# pour supprimer toute fenêtre où ce fragment pourrait être recréé/persister
# entre les deux jobs et faire régresser silencieusement le fix.
---
dontChroot: false
timeout: 10
verbose: true
script: "rm -f /etc/mkinitcpio.conf.d/archiso.conf"

i18n:
    name: "Removing leftover live-media initramfs hooks"
