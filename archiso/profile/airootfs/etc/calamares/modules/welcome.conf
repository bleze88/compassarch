# Configuration du module "welcome" (première page de l'installeur).
# Référence complète: module welcome upstream de Calamares.
---
showSupportUrl:      false
showKnownIssuesUrl:  false
showReleaseNotesUrl: false
showDonateUrl:       false

requirements:
    requiredStorage: 10.0
    requiredRam:     2.0

    # Pas de vérification "internet": l'installation utilise unpackfs (copie
    # du système live déjà installé sur l'ISO), donc aucun accès réseau
    # n'est nécessaire pendant l'installation elle-même.
    check:
        - storage
        - ram
        - power
        - root
        - screen
    required:
        - storage
        - ram
        - root
