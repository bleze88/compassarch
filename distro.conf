# Source unique de vérité pour l'identité de la distribution.
#
# Modifiez les valeurs ci-dessous puis lancez `tools/rename-distro.sh`
# pour propager le nom dans tout le dépôt (branding Calamares, profiledef.sh,
# menus de boot, motd, README, etc). Ce fichier est sourcé en shell (bash/zsh),
# gardez donc une syntaxe VAR="valeur" strictement compatible.

# Nom lisible par un humain (affiché dans SDDM, le branding Calamares, le menu de boot)
DISTRO_NAME="Compass Arch"

# Identifiant court : minuscules, chiffres, tirets uniquement.
# Utilisé dans des chemins, le nom du dossier de branding Calamares,
# le nom du dépôt pacman local n'est PAS concerné (il reste "local").
DISTRO_ID="compass-arch"

# Étiquette de volume ISO9660 : 32 caractères max, MAJUSCULES/chiffres/underscore conseillés.
DISTRO_ISO_LABEL="COMPASS_ARCH"

# Éditeur/publisher, utilisé dans profiledef.sh (iso_publisher) et le README.
DISTRO_PUBLISHER="Compass Arch Project <https://example.invalid>"

# Accroche courte utilisée dans le branding Calamares et le README.
DISTRO_TAGLINE="Une distribution Arch Linux accessible, avec KDE Plasma et l'intégration Active Directory intégrée"

# Version affichée dans profiledef.sh (iso_version) — typiquement une date, ex: 2026.07.20
DISTRO_VERSION="$(date +%Y.%m.%d)"
